<svg fill="none" width="100%" height="400" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        .slider-box {
          width: 100%;
          height: 400px;
          overflow: hidden;
          position: relative;
          border-radius: 12px;
        }
        .slider-track {
          display: flex;
          width: 400%; /* 100% × 4 slides */
          height: 100%;
          animation: slideAnimation 16s infinite ease-in-out;
        }
        .slide {
          width: 100%;
          height: 100%;
          display: flex;
          justify-content: center;
          align-items: center;
        }
        .slide img {
          width: 100%;
          height: 100%;
          object-fit: cover;
        }
        
        /* 4-slide animation: each slide holds ~22%, transitions ~3% */
        @keyframes slideAnimation {
          0%, 22%  { transform: translateX(0%); }
          25%, 47% { transform: translateX(-25%); }
          50%, 72% { transform: translateX(-50%); }
          75%, 97% { transform: translateX(-75%); }
          100%     { transform: translateX(0%); }
        }
      </style>

      <div class="slider-box">
        <div class="slider-track">
          <!-- Slide 1 -->
          <div class="slide">
            <img src="https://github.com/kardelitaitu/oz-auth/blob/main/src-tauri/screenshot1.png?raw=true" />
          </div>
          <!-- Slide 2 -->
          <div class="slide">
            <img src="https://github.com/kardelitaitu/oz-auth/blob/main/src-tauri/screenshot2.png?raw=true" />
          </div>
          <!-- Slide 3 -->
          <div class="slide">
            <img src="https://github.com/kardelitaitu/oz-auth/blob/main/src-tauri/screenshot3.png?raw=true" />
          </div>
          <!-- Slide 4 -->
          <div class="slide">
            <img src="https://github.com/kardelitaitu/oz-auth/blob/main/src-tauri/screenshot4.png?raw=true" />
          </div>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
