<!DOCTYPE html>
<html lang="en">

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>

    <div id="app">

.1849 20.294 14.773 21.0771 14.3384C21.8718 13.8973 22.5083 13.3416 22.6982 12.4634L21.2321 12.1464C21.178 12.3968 21.0001 12.6655 20.3491 13.0268C19.6865 13.3946 18.7112 13.7632 17.3032 14.2922L17.8307 15.6964ZM16.52 4.42014C15.4841 3.3832 14.6481 2.54353 13.9246 2.00638C13.1908 1.46165 12.4175 1.10912 11.5357 1.30367L11.8588 2.76845C12.1086 2.71335 12.4277 2.7633 13.0304 3.21075C13.6433 3.66579 14.3876 4.40801 15.4588 5.48026L16.52 4.42014ZM9.73087 6.74438C10.2525 5.32075 10.6161 4.33403 10.9812 3.66315C11.3402 3.00338 11.609 2.82357 11.8588 2.76845L11.5357 1.30367C10.654 1.49819 10.1005 2.14332 9.66362 2.94618C9.23278 3.73793 8.82688 4.85154 8.32243 6.22834L9.73087 6.74438ZM2.5306 22.5301L7.18383 17.8721L6.12263 16.812L1.4694 21.4699L2.5306 22.5301Z" fill="currentColor"/>
            </svg>
          </button>
          <button id="btn-minimize" title="Minimize">
            <svg width="10" height="10" viewBox="0 0 10 10">
              <path d="M2 5h6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
          <button id="btn-close" title="Close">
            <svg width="10" height="10" viewBox="0 0 10 10">
              <path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Toolbar -->
      <div id="toolbar">
        <div class="search-wrapper">
          <svg class="search-icon" viewBox="0 0 21 21" width="16" height="16">
            <g transform="translate(-243, -120)" fill="currentColor" opacity="0.4">
              <path d="M264,138.586 L262.5153,140 L258.06015,135.758 L259.54485,134.343 L264,138.586 Z M251.4,134 C247.9266,134 245.1,131.309 245.1,128 C245.1,124.692 247.9266,122 251.4,122 C254.8734,122 257.7,124.692 257.7,128 C257.7,131.309 254.8734,134 251.4,134 L251.4,134 Z M251.4,120 C246.7611,120 243,123.582 243,128 C243,132.418 246.7611,136 251.4,136 C256.0389,136 259.8,132.418 259.8,128 C259.8,123.582 256.0389,120 251.4,120 L251.4,120 Z"/>
            </g>
          </svg>
          <input type="text" id="search" placeholder="Search . . ." />
        </div>
        <button id="btn-theme" title="Toggle theme">
          <!-- Sun (shown in dark mode → toggles to light) -->
          <svg class="theme-icon-sun" viewBox="0 0 20 20" width="18" height="18">
            <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.5 3.5l1.4 1.4M15.1 15.1l1.4 1.4M3.5 16.5l1.4-1.4M15.1 4.9l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <!-- Moon (shown in light mode → toggles to dark) -->
          <svg class="theme-icon-moon" viewBox="0 0 20 20" width="18" height="18">
            <path d="M15 10.5a7 7 0 0 1-7-7A6.5 6.5 0 1 0 16.5 12a7 7 0 0 1-1.5-1.5z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button id="btn-add" title="Add Account (Ctrl+N)">
          <svg viewBox="0 0 20 20" width="18" height="18">
            <path d="M10 3v14M3 10h14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="btn-settings" title="Settings">
          <svg viewBox="0 0 479.79 479.79" width="18" height="18" fill="currentColor">
            <path d="M478.409,116.617c-0.368-4.271-3.181-7.94-7.2-9.403c-4.029-1.472-8.539-0.47-11.57,2.556l-62.015,62.011l-68.749-21.768l-21.768-68.748l62.016-62.016c3.035-3.032,4.025-7.543,2.563-11.565c-1.477-4.03-5.137-6.837-9.417-7.207c-37.663-3.245-74.566,10.202-101.247,36.887c-36.542,36.545-46.219,89.911-29.083,135.399c-1.873,1.578-3.721,3.25-5.544,5.053L19.386,373.152c-0.073,0.071-0.145,0.149-0.224,0.219c-24.345,24.346-24.345,63.959,0,88.309c24.349,24.344,63.672,24.048,88.013-0.298c0.105-0.098,0.201-0.196,0.297-0.305l193.632-208.621c1.765-1.773,3.404-3.628,4.949-5.532c45.5,17.167,98.9,7.513,135.474-29.056C468.202,191.181,481.658,154.275,478.409,116.617z M75.98,435.38c-8.971,8.969-23.5,8.963-32.47,0c-8.967-8.961-8.967-23.502,0-32.466c8.97-8.963,23.499-8.963,32.47,0C84.947,411.878,84.947,426.419,75.98,435.38z"/>
          </svg>
        </button>
      </div>

      <!-- Account list -->
      <div id="account-list"></div>

      <!-- Lock overlay -->
      <div id="lock-overlay" class="hidden">
        <button id="lock-close" title="Close">
          <svg viewBox="0 0 16 16" width="22" height="22">
            <path d="M2 2l12 12M14 2l-12 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div id="lock-card">
          <h2 id="lock-title">oz-auth is locked</h2>
          <input type="password" id="lock-input" placeholder="Enter PIN" spellcheck="false" autocomplete="off" />
          <button id="lock-submit">Unlock</button>
          <div id="lock-error" class="hidden">Wrong PIN. Try again.</div>
        </div>
      </div>

      <!-- Add/Edit Account dialog -->
      <div id="account-dialog" class="hidden">
        <div id="dialog-card">
          <h2 id="dialog-title">Add Account</h2>
          <input type="text" id="dialog-issuer" placeholder="Issuer (e.g. Google)" spellcheck="false" autocomplete="off" />
          <input type="text" id="dialog-label" placeholder="Label (e.g. user@gmail.com)" spellcheck="false" autocomplete="off" />
          <input type="text" id="dialog-secret" placeholder="Secret key" spellcheck="false" autocomplete="off" />
          <div class="dialog-row">
            <label>Algorithm</label>
            <select id="dialog-algorithm">
              <option value="SHA1">SHA1 (Google default)</option>
              <option value="SHA256">SHA256</option>
              <option value="SHA512">SHA512</option>
            </select>
          </div>
          <div class="dialog-row">
            <label>Digits</label>
            <select id="dialog-digits">
              <option value="6">6 (standard)</option>
              <option value="8">8</option>
            </select>
          </div>
          <div class="dialog-row">
            <label>Period</label>
            <select id="dialog-period">
              <option value="30">30s (standard)</option>
              <option value="60">60s</option>
            </select>
          </div>

          <div class="dialog-actions">
            <button id="dialog-cancel">Cancel</button>
            <button id="dialog-submit">Add</button>
          </div>
        </div>
      </div>

      <!-- Toast bar -->
      <div id="toast-bar" class="hidden"></div>

      <!-- PIN / Settings dialog -->
      <div id="settings-overlay" class="hidden">
        <div id="settings-card">
          <div class="settings-header">
            <h2 id="settings-title">Settings</h2>
            <button id="settings-close-btn" title="Close">
              <svg viewBox="0 0 16 16" width="16" height="16">
                <path d="M2 2l12 12M14 2l-12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <div id="settings-body">
            <!-- PIN section: dynamically filled -->
          </div>
        </div>
      </div>

      <!-- Right-click context menu -->
      <div id="context-menu" class="hidden">
        <div class="ctx-item" data-action="edit">✎ Edit</div>
        <div class="ctx-item ctx-delete" data-action="delete">✕ Delete</div>
      </div>

      <!-- Delete confirmation overlay -->
      <div id="delete-confirm-overlay" class="hidden">
        <div id="delete-confirm-card">
          <h2 id="delete-confirm-title">Delete account?</h2>
          <p id="delete-confirm-msg">This action cannot be undone.</p>
          <div class="dialog-actions">
            <button id="delete-confirm-cancel">Cancel</button>
            <button id="delete-confirm-submit">Delete</button>
          </div>
        </div>
      </div>


    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
