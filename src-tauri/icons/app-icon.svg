<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c23152"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c040"/>
      <stop offset="100%" style="stop-color:#d4a81a"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  <!-- Shield shape -->
  <path d="M256 60 L380 120 L380 280 C380 370 320 430 256 460 C192 430 132 370 132 280 L132 120 Z"
        fill="url(#shield)" stroke="#c23152" stroke-width="4"/>
  <!-- Inner shield highlight -->
  <path d="M256 60 L380 120 L380 280 C380 370 320 430 256 460 C192 430 132 370 132 280 L132 120 Z"
        fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8"
        transform="scale(0.85) translate(40,40)"/>
  <!-- Lock body (circle) -->
  <circle cx="256" cy="260" r="48" fill="url(#lock)"/>
  <!-- Keyhole -->
  <rect x="248" y="248" width="16" height="30" rx="3" fill="#1a1a2e"/>
  <circle cx="256" cy="240" r="12" fill="#1a1a2e"/>
  <!-- Lock shackle -->
  <path d="M210 240 C210 205 224 190 256 190 C288 190 302 205 302 240"
        fill="none" stroke="url(#lock)" stroke-width="14" stroke-linecap="round"/>
  <!-- Small dot accent -->
  <circle cx="306" cy="140" r="10" fill="rgba(255,255,255,0.3)"/>
</svg>
